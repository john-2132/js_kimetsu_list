<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM" crossorigin="anonymous">
  <link rel="stylesheet" href="./index.css">
  <title>鬼滅の刃 キャラクター一覧</title>
</head>
<body>
  <div class="">
    <fieldset class="text-center w-content">
      <legend>カテゴリー選択:</legend>
      <div class="btn-group" role="group">
        <input type="radio" class="btn-check" name="category" id="all" value="全キャラクター" data-path="./json/all.json" autocomplete="off" checked />
        <label class="btn btn-outline-secondary" for="all">全キャラクター</label>
      
        <input type="radio" class="btn-check" name="category" id="squadOfOgre" value="鬼殺隊" data-path="./json/kisatsutai.json" autocomplete="off" />
        <label class="btn btn-outline-secondary" for="squadOfOgre">鬼殺隊</label>
      
        <input type="radio" class="btn-check" name="category" id="piller" value="柱" data-path="./json/hashira.json" autocomplete="off" />
        <label class="btn btn-outline-secondary" for="piller">柱</label>
      
        <input type="radio" class="btn-check" name="category" id="ogre" value="鬼" data-path="./json/oni.json" autocomplete="off" />
        <label class="btn btn-outline-secondary" for="ogre">鬼</label>
      </div>
      </div>
    </fieldset>
  </div>
  <div class="text-center mt-3" aria-label="読み込み中" id="loader">
    <div class="spinner-border" role="status">
      <span class="visually-hidden">Loading...</span>
    </div>
  </div>
  <div id="gallery" class="d-grid mt-3"></div>
  <script src="app.js" type="module"></script>
</body>
</html>
